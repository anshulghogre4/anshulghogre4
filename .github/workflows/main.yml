name: Generate GitHub Stats SVGs

on:
  schedule:
    # Runs once a day at 00:00 UTC — adjust if you want it fresher
    - cron: "0 0 * * *"
  workflow_dispatch:  # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate-stats:
    name: Generate stats SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate SVGs
        uses: jstrieb/github-stats@master
        with:
          username: anshulghogre4
          access_token: ${{ secrets.ACCESS_TOKEN }}
          exclude_repos: ""
          exclude_langs: ""
          include_all_commits: true
          line_efficiency_calculation: true
          card_width: 500
