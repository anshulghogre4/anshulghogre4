<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Anshul Ghogre — Forward Deployed Engineer</title>
  <desc id="hero-desc">Applied AI engineer who ships agentic systems, MLOps pipelines, and full-stack delivery into production.</desc>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#E6EDF3" stroke-opacity=".03"/>
    </pattern>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#63D3BE"/><stop offset="1" stop-color="#3FBFA5"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="390" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- Background -->
    <rect width="1200" height="390" rx="24" fill="#0D1117"/>
    <rect width="1200" height="390" fill="url(#grid)"/>

    <!-- Ambient glow -->
    <circle cx="1080" cy="50" r="130" fill="#00D9FF" fill-opacity=".04"/>
    <circle cx="1020" cy="340" r="150" fill="#63D3BE" fill-opacity=".03"/>
    <circle cx="180" cy="380" r="100" fill="#A78BFA" fill-opacity=".02"/>

    <!-- ─── Left: Identity Block ─── -->
    <g transform="translate(56 42)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <!-- Eyebrow -->
      <text x="0" y="16" fill="#00D9FF" font-size="14" font-weight="700" letter-spacing="3">FORWARD DEPLOYED ENGINEER</text>
      <rect x="0" y="30" width="44" height="5" rx="2.5" fill="#00D9FF"/>

      <!-- Name -->
      <text x="0" y="114" fill="#E6EDF3" font-size="74" font-weight="800" letter-spacing="-3">Anshul</text>
      <text x="0" y="186" fill="#E6EDF3" font-size="68" font-weight="780" letter-spacing="-2">Ghogre</text>
      <rect x="0" y="200" width="260" height="14" rx="3" fill="#00D9FF" fill-opacity=".65"/>

      <!-- Tagline -->
      <text x="0" y="252" fill="#8B949E" font-size="22" font-weight="500">I ship AI into production.</text>
      <text x="308" y="252" fill="#FF7B72" font-size="22" font-weight="700">Not demos.</text>

      <!-- Metadata -->
      <text x="0" y="298" fill="#484F58" font-size="12" font-weight="600" letter-spacing="1.8"
            font-family="ui-monospace,SFMono-Regular,Menlo,monospace">AGENTIC SYSTEMS · MLOPS · FULL-STACK · PUNE, INDIA</text>
    </g>

    <!-- ─── Right: Three Overlapping Project Cards ─── -->
    <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

      <!-- Card 1 · Agentic Systems (top, CW rotation) -->
      <g transform="translate(740 36) rotate(4 145 88)">
        <rect x="6" y="8" width="290" height="176" rx="18" fill="#000" fill-opacity=".3"/>
        <rect width="290" height="176" rx="18" fill="#161B22"/>
        <rect x="18" y="18" width="52" height="7" rx="3.5" fill="#00D9FF"/>
        <text x="18" y="50" fill="#E6EDF3" font-size="16" font-weight="760">AGENTIC SYSTEMS</text>

        <!-- Node diagram -->
        <circle cx="55" cy="100" r="14" fill="#00D9FF" fill-opacity=".15" stroke="#00D9FF" stroke-width="2"/>
        <text x="55" y="104" fill="#00D9FF" font-size="8" font-weight="700" text-anchor="middle"
              font-family="ui-monospace,SFMono-Regular,Menlo,monospace">LLM</text>

        <circle cx="145" cy="88" r="14" fill="#A78BFA" fill-opacity=".15" stroke="#A78BFA" stroke-width="2"/>
        <text x="145" y="92" fill="#A78BFA" font-size="8" font-weight="700" text-anchor="middle"
              font-family="ui-monospace,SFMono-Regular,Menlo,monospace">RAG</text>

        <circle cx="235" cy="100" r="14" fill="#63D3BE" fill-opacity=".15" stroke="#63D3BE" stroke-width="2"/>
        <text x="235" y="104" fill="#63D3BE" font-size="8" font-weight="700" text-anchor="middle"
              font-family="ui-monospace,SFMono-Regular,Menlo,monospace">OUT</text>

        <path d="M69 97l62-7" stroke="#484F58" stroke-width="2" stroke-dasharray="4 3"/>
        <path d="M159 91l62 7" stroke="#484F58" stroke-width="2" stroke-dasharray="4 3"/>

        <!-- Terminal line -->
        <rect x="18" y="130" width="254" height="28" rx="6" fill="#0D1117"/>
        <text x="30" y="149" fill="#63D3BE" font-size="11" font-weight="600"
              font-family="ui-monospace,SFMono-Regular,Menlo,monospace">$ deploy --agent multi-step</text>
      </g>

      <!-- Card 2 · MLOps Pipeline (middle, CCW rotation) -->
      <g transform="translate(680 170) rotate(-5 135 75)">
        <rect x="6" y="8" width="270" height="150" rx="18" fill="#000" fill-opacity=".3"/>
        <rect width="270" height="150" rx="18" fill="url(#mint)"/>
        <text x="18" y="36" fill="#0D3B33" font-size="14" font-weight="760" letter-spacing="1.2">MLOPS PIPELINE</text>

        <!-- Pipeline stages -->
        <g transform="translate(18 58)">
          <rect width="64" height="32" rx="8" fill="#F7F2E8"/>
          <text x="32" y="21" fill="#0D3B33" font-size="10" font-weight="700" text-anchor="middle"
                font-family="ui-monospace,SFMono-Regular,Menlo,monospace">DATA</text>

          <rect x="80" width="64" height="32" rx="8" fill="#F7F2E8"/>
          <text x="112" y="21" fill="#0D3B33" font-size="10" font-weight="700" text-anchor="middle"
                font-family="ui-monospace,SFMono-Regular,Menlo,monospace">TRAIN</text>

          <rect x="160" width="76" height="32" rx="8" fill="#0D3B33"/>
          <text x="198" y="21" fill="#63D3BE" font-size="10" font-weight="700" text-anchor="middle"
                font-family="ui-monospace,SFMono-Regular,Menlo,monospace">DEPLOY</text>

          <path d="M64 16h16M144 16h16" stroke="#0D3B33" stroke-width="3" stroke-linecap="round"/>
        </g>

        <!-- Status bar -->
        <rect x="18" y="110" width="234" height="22" rx="6" fill="#0D3B33" fill-opacity=".3"/>
        <circle cx="32" cy="121" r="5" fill="#4ADE80"/>
        <text x="44" y="125" fill="#F7F2E8" font-size="10" font-weight="600"
              font-family="ui-monospace,SFMono-Regular,Menlo,monospace">pipeline: healthy</text>
      </g>

      <!-- Card 3 · Full Stack (bottom-right, CW rotation) -->
      <g transform="translate(860 230) rotate(6 115 65)">
        <rect x="5" y="7" width="230" height="130" rx="16" fill="#000" fill-opacity=".3"/>
        <rect width="230" height="130" rx="16" fill="#6A62D9"/>
        <text x="16" y="32" fill="#E6EDF3" font-size="13" font-weight="760" letter-spacing="1">FULL STACK</text>

        <!-- Mini browser mockup -->
        <rect x="16" y="46" width="198" height="68" rx="8" fill="#1E1B4B"/>
        <circle cx="28" cy="56" r="3" fill="#FF7B72"/>
        <circle cx="38" cy="56" r="3" fill="#FFD93D"/>
        <circle cx="48" cy="56" r="3" fill="#4ADE80"/>
        <rect x="24" y="66" width="80" height="6" rx="3" fill="#A78BFA" fill-opacity=".5"/>
        <rect x="24" y="78" width="120" height="6" rx="3" fill="#A78BFA" fill-opacity=".3"/>
        <rect x="24" y="90" width="60" height="6" rx="3" fill="#A78BFA" fill-opacity=".3"/>
        <rect x="150" y="66" width="56" height="38" rx="6" fill="#00D9FF" fill-opacity=".2"/>
      </g>

    </g>
  </g>
</svg>
